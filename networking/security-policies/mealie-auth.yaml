apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: wol-auth-mealie
  namespace: mealie
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: mealie
  extAuth:
    headersToExtAuth:
      - cookie
      - authorization
      - x-forwarded-for
      - x-forwarded-proto
      - x-forwarded-host
    http:
      backendRefs:
        - name: authentik-server
          namespace: authentik
          port: 9000
      path: /outpost.goauthentik.io/auth/envoy
      headersToBackend:
        - cookie
        - authorization
