apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agent-gateway
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: envoy-gateway-home
      namespace: envoy-gateway-system
  hostnames:
    - agent-gateway.home.timosur.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: agentgateway-proxy
          namespace: agentgateway-system
          port: 15000
