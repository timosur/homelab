---
- name: Restart sshd
  ansible.builtin.systemd:
    name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
    state: reloaded
  become: true

- name: Restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted
  become: true

- name: Restart auditd
  ansible.builtin.service:
    name: auditd
    state: restarted
  become: true
