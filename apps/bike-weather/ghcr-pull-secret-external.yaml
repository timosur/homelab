# External Secret to fetch GitHub PAT from Azure Key Vault
# This pulls the GitHub Personal Access Token and creates a docker-registry secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-io-pull-secret
  namespace: bike-weather
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: ghcr-io-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockercfg
      data:
        .dockercfg: |
          {
            "ghcr.io": {
              "username": "timosur",
              "password": "{{ .githubPat }}",
              "email": "github@timosur.com",
              "auth": "{{ printf "%s:%s" "timosur" .githubPat | b64enc }}"
            }
          }
  data:
    - secretKey: githubPat
      remoteRef:
        key: bike-weather-github-pat
