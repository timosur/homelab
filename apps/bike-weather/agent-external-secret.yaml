apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bike-weather-agent-secrets
  namespace: bike-weather
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: bike-weather-agent-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        AGENT_LLM_API_KEY: "{{ .llmApiKey }}"
        AGENT_ADMIN_TOKEN: "{{ .adminToken }}"
  data:
    - secretKey: llmApiKey
      remoteRef:
        key: bike-weather-agent-llm-api-key
    - secretKey: adminToken
      remoteRef:
        key: bike-weather-agent-admin-token
