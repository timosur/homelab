apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: amd-gpu-device-plugin
  namespace: amd-gpu-device-plugin
  labels:
    app: amd-gpu-device-plugin
spec:
  selector:
    matchLabels:
      app: amd-gpu-device-plugin
  template:
    metadata:
      labels:
        app: amd-gpu-device-plugin
    spec:
      priorityClassName: system-node-critical
      nodeSelector:
        node.kubernetes.io/gpu: amd
      tolerations:
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: amd-gpu-device-plugin
          image: rocm/k8s-device-plugin:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 20Mi
            limits:
              cpu: 100m
              memory: 100Mi
          volumeMounts:
            - name: dp
              mountPath: /var/lib/kubelet/device-plugins
            - name: sys
              mountPath: /sys
            - name: dev-dri
              mountPath: /dev/dri
            - name: dev-kfd
              mountPath: /dev/kfd
      volumes:
        - name: dp
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: sys
          hostPath:
            path: /sys
        - name: dev-dri
          hostPath:
            path: /dev/dri
        - name: dev-kfd
          hostPath:
            path: /dev/kfd
