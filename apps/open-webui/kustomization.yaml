apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: open-webui

resources:
  - namespace.yaml
  - redis-configmap.yaml
  - redis-pvc.yaml
  - redis-deployment.yaml
  - redis-service.yaml
  - postgres.yaml
  - external-secret.yaml
  # Ollama runs natively on GPU node (systemd), not as a K8s pod
  # Traffic goes through wol-proxy: open-webui -> wol-proxy -> 192.168.2.47:11434
  - webui-deployment.yaml
  - webui-pvc.yaml
  - webui-service.yaml
  - open-terminal-pvc.yaml
  - open-terminal-deployment.yaml
  - open-terminal-service.yaml
