apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ollama
  namespace: open-webui
spec:
  serviceName: "ollama"
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      # Use host network so Ollama binds to node IP (for WoL proxy access)
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        node.kubernetes.io/gpu: amd
      tolerations:
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
              hostPort: 11434
          env:
            # Use Vulkan backend - works better than ROCm on RX 5700 XT (gfx1010)
            - name: OLLAMA_VULKAN
              value: "1"
            - name: OLLAMA_LLM_LIBRARY
              value: "vulkan"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "4000m"
              memory: "16Gi"
          # Mount GPU devices for Vulkan access
          securityContext:
            privileged: true
          volumeMounts:
            - name: ollama-volume
              mountPath: /root/.ollama
          tty: true
  volumeClaimTemplates:
    - metadata:
        name: ollama-volume
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 50Gi
