apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-terminal
  namespace: open-webui
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: open-terminal
  template:
    metadata:
      labels:
        app: open-terminal
    spec:
      nodeSelector:
        kubernetes.io/hostname: homelab-amd
      containers:
        - name: open-terminal
          image: ghcr.io/open-webui/open-terminal:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          env:
            - name: OPEN_TERMINAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: open-webui-secrets
                  key: open-terminal-api-key
          volumeMounts:
            - name: open-terminal-volume
              mountPath: /home/user
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 3
      volumes:
        - name: open-terminal-volume
          persistentVolumeClaim:
            claimName: open-terminal-pvc
