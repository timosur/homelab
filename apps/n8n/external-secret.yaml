apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-postgres-credentials
  namespace: n8n
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: n8n-postgres-credentials
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: n8n-postgres-username
    - secretKey: password
      remoteRef:
        key: n8n-postgres-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-secrets
  namespace: n8n
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: n8n-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        N8N_ENCRYPTION_KEY: "{{ .encryptionKey }}"
        DB_POSTGRESDB_PASSWORD: "{{ .postgresPassword }}"
  data:
    - secretKey: encryptionKey
      remoteRef:
        key: n8n-encryption-key
    - secretKey: postgresPassword
      remoteRef:
        key: n8n-postgres-password
