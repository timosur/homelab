apiVersion: apps/v1
kind: Deployment
metadata:
  name: bike-weather-preview-backend
  namespace: bike-weather-preview
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bike-weather-preview-backend
  template:
    metadata:
      labels:
        app: bike-weather-preview-backend
    spec:
      nodeSelector:
        kubernetes.io/hostname: homelab-amd-desktop
      tolerations:
        - key: "availability"
          operator: "Equal"
          value: "daytime"
          effect: "NoSchedule"
      imagePullSecrets:
        - name: ghcr-io-pull-secret
      initContainers:
        - name: wait-for-db
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              echo "Waiting for database at central-postgres-rw.postgres.svc.cluster.local:5432..."
              until nc -z central-postgres-rw.postgres.svc.cluster.local 5432; do
                echo "Database not ready, retrying in 3s..."
                sleep 3
              done
              echo "Database is accepting connections!"
      containers:
        - name: backend
          image: ghcr.io/timosur/bike-weather/backend:0.1.0-preview.1
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: bike-weather-preview-config
            - secretRef:
                name: bike-weather-preview-secrets
          env:
            - name: DB_HOST
              value: "central-postgres-rw.postgres.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "app"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: bike-weather-preview-db-connection
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bike-weather-preview-db-connection
                  key: password
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
