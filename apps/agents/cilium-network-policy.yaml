apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: agents-network-policy
  namespace: agents
spec:
  description: "Network policy for kagent engine, controller, and UI pods"
  endpointSelector: {}
  ingress:
    # kagent UI exposed via envoy-gateway-home
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: envoy-gateway-system
    # Internal pod-to-pod within agents namespace (engine ↔ postgres)
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: agents
  egress:
    # DNS
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Ollama LLM inference (ExternalName → wol-proxy)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: wol-proxy
      toPorts:
        - ports:
            - port: "11434"
              protocol: TCP
    # MCP tool server
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: mcp
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
    # Kubernetes API server
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
    # Central PostgreSQL cluster
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: postgres
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Internal pod-to-pod within agents namespace (controller ↔ tool servers, etc.)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: agents
