apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: kagent-postgres
  namespace: agents
spec:
  instances: 1
  enablePDB: false
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
  bootstrap:
    initdb:
      database: kagent
      owner: kagent
      secret:
        name: kagent-postgres-credentials
  storage:
    size: 10Gi
    storageClass: hcloud-volumes
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
