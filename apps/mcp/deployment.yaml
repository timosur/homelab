apiVersion: apps/v1
kind: Deployment
metadata:
  name: coding-tools-mcp
  namespace: mcp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: coding-tools-mcp
  template:
    metadata:
      labels:
        app: coding-tools-mcp
        app.kubernetes.io/part-of: mcp
    spec:
      containers:
        - name: coding-tools-mcp
          image: ghcr.io/timosur/homelab/coding-tools-mcp:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mcp-github-credentials
                  key: GITHUB_TOKEN
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
      volumes:
        - name: workspace
          emptyDir:
            sizeLimit: 10Gi
