apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-github-credentials
  namespace: mcp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: mcp-github-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        GITHUB_TOKEN: "{{ .pat }}"
  data:
    - secretKey: pat
      remoteRef:
        key: mcp-github-pat
