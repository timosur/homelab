apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: mcp-process-policy
  namespace: mcp
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: mcp
  kprobes:
    # Process allow-list: kill anything not in the approved list
    - call: "sys_execve"
      syscall: true
      args:
        - index: 0
          type: "string"
      selectors:
        - matchArgs:
            - index: 0
              operator: "NotIn"
              values:
                - "/usr/bin/git"
                - "/usr/bin/gh"
                - "/bin/bash"
                - "/bin/sh"
                - "/usr/bin/jq"
                - "/usr/local/bin/python3"
                - "/usr/local/bin/python3.12"
                - "/usr/local/bin/python"
          matchActions:
            - action: Sigkill
    # File write access: deny writes outside /workspace and /tmp
    - call: "sys_openat"
      syscall: true
      args:
        - index: 1
          type: "string"
        - index: 2
          type: "int"
      selectors:
        - matchArgs:
            - index: 2
              operator: "Mask"
              values:
                - "2"  # O_WRONLY or O_RDWR
            - index: 1
              operator: "NotPrefix"
              values:
                - "/workspace"
                - "/tmp"
                - "/dev/null"
                - "/proc/self"
          matchActions:
            - action: Sigkill
