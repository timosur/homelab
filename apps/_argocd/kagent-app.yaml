apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kagent
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: oci://ghcr.io/kagent-dev/kagent/helm/kagent
      chart: kagent
      targetRevision: 0.8.0
      helm:
        valuesObject:
          providers:
            default: ollama
          kmcp:
            enabled: true
          database:
            postgres:
              urlFile: /etc/kagent/db/uri
              bundled:
                enabled: false
          controller:
            volumes:
              - name: db-connection
                secret:
                  secretName: agents-db-connection
            volumeMounts:
              - name: db-connection
                mountPath: /etc/kagent/db
                readOnly: true
          agents:
            istio-agent:
              enabled: false
            promql-agent:
              enabled: false
            argo-rollouts-agent:
              enabled: false
            helm-agent:
              enabled: false
          tools:
            grafana-mcp:
              enabled: false
            querydoc:
              enabled: false
    - repoURL: https://github.com/timosur/homelab.git
      targetRevision: HEAD
      path: apps/agents
  destination:
    server: https://kubernetes.default.svc
    namespace: agents
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
