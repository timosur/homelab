apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kagent
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: oci://ghcr.io/kagent-dev/kagent/helm/kagent
      chart: kagent
      targetRevision: 0.8.0
      helm:
        valuesObject:
          global:
            nodeSelector:
              kubernetes.io/hostname: homelab-amd-desktop
            tolerations:
              - key: availability
                operator: Equal
                value: daytime
                effect: NoSchedule
          providers:
            default: ollama
            ollama:
              provider: Ollama
              model: devstral:latest
              config:
                host: ollama.agentgateway-system.svc.cluster.local:11434
          kmcp:
            enabled: true
          database:
            postgres:
              urlFile: /etc/kagent/db/uri
              bundled:
                enabled: false
          controller:
            nodeSelector:
              kubernetes.io/hostname: homelab-amd-desktop
            tolerations:
              - key: availability
                operator: Equal
                value: daytime
                effect: NoSchedule
            volumes:
              - name: db-connection
                secret:
                  secretName: agents-db-connection
            volumeMounts:
              - name: db-connection
                mountPath: /etc/kagent/db
                readOnly: true
          agents:
            istio-agent:
              enabled: false
            promql-agent:
              enabled: false
            argo-rollouts-agent:
              enabled: false
            helm-agent:
              enabled: false
            k8s-agent:
              nodeSelector:
                kubernetes.io/hostname: homelab-amd-desktop
              tolerations:
                - key: availability
                  operator: Equal
                  value: daytime
                  effect: NoSchedule
            cilium-debug-agent:
              nodeSelector:
                kubernetes.io/hostname: homelab-amd-desktop
              tolerations:
                - key: availability
                  operator: Equal
                  value: daytime
                  effect: NoSchedule
            cilium-manager-agent:
              nodeSelector:
                kubernetes.io/hostname: homelab-amd-desktop
              tolerations:
                - key: availability
                  operator: Equal
                  value: daytime
                  effect: NoSchedule
            cilium-policy-agent:
              nodeSelector:
                kubernetes.io/hostname: homelab-amd-desktop
              tolerations:
                - key: availability
                  operator: Equal
                  value: daytime
                  effect: NoSchedule
            kgateway-agent:
              nodeSelector:
                kubernetes.io/hostname: homelab-amd-desktop
              tolerations:
                - key: availability
                  operator: Equal
                  value: daytime
                  effect: NoSchedule
            observability-agent:
              nodeSelector:
                kubernetes.io/hostname: homelab-amd-desktop
              tolerations:
                - key: availability
                  operator: Equal
                  value: daytime
                  effect: NoSchedule
          tools:
            grafana-mcp:
              enabled: false
            querydoc:
              enabled: false
    - repoURL: https://github.com/timosur/homelab.git
      targetRevision: HEAD
      path: apps/agents
  destination:
    server: https://kubernetes.default.svc
    namespace: agents
  ignoreDifferences:
    - group: k8s.homelab.timosur.com
      kind: AppDBClaim
      jsonPointers:
        - /metadata
        - /spec
        - /status
    - group: k8s.homelab.timosur.com
      kind: AppDB
      jsonPointers:
        - /metadata
        - /spec
        - /status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
