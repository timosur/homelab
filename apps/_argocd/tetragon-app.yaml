apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tetragon
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://helm.cilium.io
      chart: tetragon
      targetRevision: v1.6.0
      helm:
        valuesObject:
          tetragon:
            enabled: true
          tetragonOperator:
            enabled: true
    - repoURL: https://github.com/timosur/homelab.git
      targetRevision: HEAD
      path: apps/tetragon
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
