apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 61.3.1
      helm:
        valuesObject:
          fullnameOverride: monitoring
          defaultRules:
            create: true
            rules:
              kubernetesApps: true
              kubernetesResources: true
              kubernetesStorage: true
              kubernetesSystem: true
              kubeApiserver: true
              kubeApiserverAvailability: true
              kubeApiserverSlos: true
              kubelet: true
              kubeProxy: true
              kubePrometheusGeneral: true
              kubePrometheusNodeRecording: true
              nodeExporterAlerting: true
              nodeExporterRecording: true
              prometheus: true
          grafana:
            enabled: true
            adminPassword: ""
            admin:
              existingSecret: grafana-admin-secret
              userKey: admin-user
              passwordKey: admin-password
            persistence:
              enabled: true
              storageClassName: local-path
              size: 5Gi
            ingress:
              enabled: false
            grafana.ini:
              server:
                protocol: http
                enforce_domain: false
                root_url: http://grafana.home.timosur.com
              security:
                cookie_secure: false
                cookie_samesite: lax
          prometheus:
            prometheusSpec:
              retention: 30d
              retentionSize: 18GB
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    storageClassName: local-path
                    resources:
                      requests:
                        storage: 20Gi
              serviceMonitorSelectorNilUsesHelmValues: false
          alertmanager:
            enabled: true
            config:
              global:
                resolve_timeout: 5m
                smtp_smarthost: 'smtp.gmail.com:587'
                smtp_from: 'timo.surmann@googlemail.com'
                smtp_auth_username_file: /etc/alertmanager/secrets/monitoring-smtp-secret/SMTP_USERNAME
                smtp_auth_password_file: /etc/alertmanager/secrets/monitoring-smtp-secret/SMTP_PASSWORD
                smtp_require_tls: true
              route:
                group_by: [alertname, namespace]
                group_wait: 30s
                group_interval: 5m
                repeat_interval: 12h
                receiver: email
                routes:
                  - receiver: 'null'
                    matchers:
                      - alertname =~ "InfoInhibitor|Watchdog"
              receivers:
                - name: 'null'
                - name: email
                  email_configs:
                    - to: 'homelab@timosur.com'
                      send_resolved: true
              inhibit_rules:
                - source_matchers: [severity = critical]
                  target_matchers: [severity =~ "warning|info"]
                  equal: [namespace, alertname]
            alertmanagerSpec:
              storage:
                volumeClaimTemplate:
                  spec:
                    storageClassName: local-path
                    resources:
                      requests:
                        storage: 2Gi
              secrets:
                - monitoring-smtp-secret
          nodeExporter:
            enabled: true
          kubeStateMetrics:
            enabled: true
          prometheusOperator:
            enabled: true
    - repoURL: https://github.com/timosur/homelab.git
      targetRevision: HEAD
      path: apps/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
