apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 82.8.0
      helm:
        valuesObject:
          fullnameOverride: monitoring
          defaultRules:
            create: true
            rules:
              kubernetesApps: true
              kubernetesResources: true
              kubernetesStorage: true
              kubernetesSystem: true
              kubeApiserver: true
              kubeApiserverAvailability: true
              kubeApiserverSlos: true
              kubelet: true
              kubeProxy: true
              kubePrometheusGeneral: true
              kubePrometheusNodeRecording: true
              nodeExporterAlerting: true
              nodeExporterRecording: true
              prometheus: true
          grafana:
            enabled: true
            adminPassword: ""
            admin:
              existingSecret: grafana-admin-secret
              userKey: admin-user
              passwordKey: admin-password
            persistence:
              enabled: true
              storageClassName: local-path
              size: 5Gi
            ingress:
              enabled: false
            grafana.ini:
              server:
                protocol: http
                enforce_domain: false
                root_url: http://grafana.home.timosur.com
              security:
                cookie_secure: false
                cookie_samesite: lax
          prometheus:
            prometheusSpec:
              retention: 30d
              retentionSize: 18GB
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    storageClassName: local-path
                    resources:
                      requests:
                        storage: 20Gi
              serviceMonitorSelectorNilUsesHelmValues: false
          alertmanager:
            enabled: true
            config:
              global:
                resolve_timeout: 5m
                smtp_smarthost: 'smtp.gmail.com:587'
                smtp_from: 'timo.surmann@googlemail.com'
                smtp_auth_username_file: /etc/alertmanager/secrets/monitoring-smtp-secret/SMTP_USERNAME
                smtp_auth_password_file: /etc/alertmanager/secrets/monitoring-smtp-secret/SMTP_PASSWORD
                smtp_require_tls: true
              route:
                group_by: [alertname, namespace]
                group_wait: 30s
                group_interval: 5m
                repeat_interval: 12h
                receiver: email
                routes:
                  - receiver: 'null'
                    matchers:
                      - alertname =~ "InfoInhibitor|Watchdog"
              receivers:
                - name: 'null'
                - name: email
                  email_configs:
                    - to: 'homelab@timosur.com'
                      send_resolved: true
              inhibit_rules:
                - source_matchers: [severity = critical]
                  target_matchers: [severity =~ "warning|info"]
                  equal: [namespace, alertname]
            alertmanagerSpec:
              storage:
                volumeClaimTemplate:
                  spec:
                    storageClassName: local-path
                    resources:
                      requests:
                        storage: 2Gi
              secrets:
                - monitoring-smtp-secret
          grafana:
            additionalDataSources:
              - name: Loki
                type: loki
                url: http://loki.monitoring.svc.cluster.local:3100
                access: proxy
                isDefault: false
              - name: Tempo
                type: tempo
                url: http://tempo.monitoring.svc.cluster.local:3100
                access: proxy
                isDefault: false
                jsonData:
                  tracesToLogsV2:
                    datasourceUid: loki
                    filterByTraceID: true
                  nodeGraph:
                    enabled: true
                  serviceMap:
                    datasourceUid: monitoring-prometheus
          nodeExporter:
            enabled: true
          kubeStateMetrics:
            enabled: true
          prometheusOperator:
            enabled: true
    # Loki — log aggregation (monolithic mode)
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki
      targetRevision: 6.53.0
      helm:
        valuesObject:
          deploymentMode: SingleBinary
          loki:
            auth_enabled: false
            commonConfig:
              replication_factor: 1
            schemaConfig:
              configs:
                - from: "2024-01-01"
                  store: tsdb
                  object_store: filesystem
                  schema: v13
                  index:
                    prefix: loki_index_
                    period: 24h
            storage:
              type: filesystem
          singleBinary:
            replicas: 1
            persistence:
              enabled: true
              storageClass: local-path
              size: 10Gi
          backend:
            replicas: 0
          read:
            replicas: 0
          write:
            replicas: 0
          gateway:
            enabled: false
          chunksCache:
            enabled: false
          resultsCache:
            enabled: false
          lokiCanary:
            enabled: false
          test:
            enabled: false
    # Tempo — distributed tracing (monolithic mode)
    - repoURL: https://grafana.github.io/helm-charts
      chart: tempo
      targetRevision: 1.24.4
      helm:
        valuesObject:
          tempo:
            storage:
              trace:
                backend: local
                local:
                  path: /var/tempo/traces
            receivers:
              otlp:
                protocols:
                  grpc:
                    endpoint: "0.0.0.0:4317"
          persistence:
            enabled: true
            storageClassName: local-path
            size: 10Gi
    # Alloy — telemetry collector (Faro receiver + OTLP relay)
    - repoURL: https://grafana.github.io/helm-charts
      chart: alloy
      targetRevision: 1.6.1
      helm:
        valuesObject:
          alloy:
            configMap:
              content: |
                // Faro receiver — browser telemetry from Grafana Faro SDK
                faro.receiver "default" {
                  server {
                    listen_address = "0.0.0.0"
                    listen_port    = 12347
                    cors_allowed_origins = ["https://bike-weather.com", "https://fahrrad-wetter.com"]
                  }
                  output {
                    logs   = [loki.write.default.receiver]
                    traces = [otelcol.exporter.otlp.tempo.input]
                  }
                }

                // OTLP gRPC receiver — backend traces
                otelcol.receiver.otlp "default" {
                  grpc {
                    endpoint = "0.0.0.0:4317"
                  }
                  output {
                    traces = [otelcol.exporter.otlp.tempo.input]
                  }
                }

                // Export traces to Tempo
                otelcol.exporter.otlp "tempo" {
                  client {
                    endpoint = "tempo.monitoring.svc.cluster.local:4317"
                    tls {
                      insecure = true
                    }
                  }
                }

                // Write logs to Loki
                loki.write "default" {
                  endpoint {
                    url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
                  }
                }
            extraPorts:
              - name: faro
                port: 12347
                targetPort: 12347
                protocol: TCP
              - name: otlp-grpc
                port: 4317
                targetPort: 4317
                protocol: TCP
    - repoURL: https://github.com/timosur/homelab.git
      targetRevision: HEAD
      path: apps/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
