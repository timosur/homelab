apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/timosur/homelab.git
    targetRevision: HEAD
    path: apps/n8n
  destination:
    server: https://kubernetes.default.svc
  ignoreDifferences:
    - group: k8s.homelab.timosur.com
      kind: AppDBClaim
      jsonPointers:
        - /metadata
        - /spec
        - /status
    - group: k8s.homelab.timosur.com
      kind: AppDB
      jsonPointers:
        - /metadata
        - /spec
        - /status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
